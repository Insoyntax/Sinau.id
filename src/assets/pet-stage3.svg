<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Outer glow -->
  <circle cx="100" cy="105" r="85" fill="url(#s3bg)" opacity="0.25"/>
  <!-- Large wings -->
  <path d="M10 85 Q0 55 35 50 L72 115" fill="url(#s3wing)" opacity="0.8"/>
  <path d="M190 85 Q200 55 165 50 L128 115" fill="url(#s3wing)" opacity="0.8"/>
  <!-- Crown -->
  <path d="M72 48 L82 36 L92 44 L100 34 L108 44 L118 36 L128 48" stroke="#f59e0b" stroke-width="3" fill="none" stroke-linejoin="round"/>
  <circle cx="82" cy="36" r="4" fill="#fbbf24"/>
  <circle cx="100" cy="34" r="5" fill="#fcd34d"/>
  <circle cx="118" cy="36" r="4" fill="#fbbf24"/>
  <!-- Antenna -->
  <line x1="100" y1="48" x2="100" y2="60" stroke="#9333ea" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Head -->
  <rect x="58" y="60" width="84" height="66" rx="16" fill="url(#s3head)"/>
  <!-- Visor -->
  <rect x="68" y="72" width="64" height="30" rx="10" fill="url(#s3visor)"/>
  <!-- Eyes — glowing pink -->
  <circle cx="86" cy="87" r="9" fill="#f472b6"/>
  <circle cx="114" cy="87" r="9" fill="#f472b6"/>
  <circle cx="87" cy="85" r="4" fill="white" opacity="0.95"/>
  <circle cx="115" cy="85" r="4" fill="white" opacity="0.95"/>
  <!-- Body -->
  <rect x="64" y="128" width="72" height="52" rx="16" fill="url(#s3body)"/>
  <!-- Chest medal -->
  <circle cx="100" cy="148" r="10" fill="#f59e0b"/>
  <circle cx="100" cy="148" r="7" fill="#fbbf24"/>
  <circle cx="100" cy="148" r="4" fill="#fef3c7"/>
  <!-- Arms — large -->
  <rect x="22" y="132" width="38" height="16" rx="8" fill="url(#s3arm)"/>
  <rect x="140" y="132" width="38" height="16" rx="8" fill="url(#s3arm)"/>
  <ellipse cx="22" cy="124" rx="24" ry="6" fill="#9333ea" opacity="0.6"/>
  <ellipse cx="178" cy="124" rx="24" ry="6" fill="#9333ea" opacity="0.6"/>
  <!-- Legs -->
  <rect x="76" y="178" width="18" height="16" rx="6" fill="url(#s3leg)"/>
  <rect x="106" y="178" width="18" height="16" rx="6" fill="url(#s3leg)"/>
  <defs>
    <radialGradient id="s3bg" cx="50%" cy="50%"><stop stop-color="#f472b6"/><stop offset="0.5" stop-color="#a855f7"/><stop offset="1" stop-color="#7c3aed"/></radialGradient>
    <linearGradient id="s3head" x1="58" y1="60" x2="142" y2="126" gradientUnits="userSpaceOnUse"><stop stop-color="#7e22ce"/><stop offset="1" stop-color="#3b0764"/></linearGradient>
    <linearGradient id="s3visor" x1="68" y1="72" x2="132" y2="102" gradientUnits="userSpaceOnUse"><stop stop-color="#ec4899" stop-opacity="0.9"/><stop offset="1" stop-color="#a21caf" stop-opacity="0.7"/></linearGradient>
    <linearGradient id="s3body" x1="64" y1="128" x2="136" y2="180" gradientUnits="userSpaceOnUse"><stop stop-color="#581c87"/><stop offset="1" stop-color="#3b0764"/></linearGradient>
    <linearGradient id="s3arm" x1="22" y1="132" x2="178" y2="148" gradientUnits="userSpaceOnUse"><stop stop-color="#7e22ce"/><stop offset="1" stop-color="#9333ea"/></linearGradient>
    <linearGradient id="s3leg" x1="76" y1="178" x2="124" y2="194" gradientUnits="userSpaceOnUse"><stop stop-color="#581c87"/><stop offset="1" stop-color="#3b0764"/></linearGradient>
    <linearGradient id="s3wing" x1="0" y1="50" x2="72" y2="115" gradientUnits="userSpaceOnUse"><stop stop-color="#f0abfc" stop-opacity="0.8"/><stop offset="1" stop-color="#9333ea" stop-opacity="0.1"/></linearGradient>
