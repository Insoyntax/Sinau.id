<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Glow bg -->
  <circle cx="100" cy="108" r="80" fill="url(#s2bg)" opacity="0.3"/>
  <!-- Wings -->
  <path d="M20 90 Q10 70 38 65 L68 115" fill="url(#s2wing)" opacity="0.7"/>
  <path d="M180 90 Q190 70 162 65 L132 115" fill="url(#s2wing)" opacity="0.7"/>
  <!-- Antenna -->
  <line x1="100" y1="30" x2="100" y2="50" stroke="#7c3aed" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="100" cy="24" r="8" fill="#7c3aed"/>
  <circle cx="100" cy="24" r="5" fill="#c4b5fd"/>
  <!-- Head -->
  <rect x="62" y="50" width="76" height="62" rx="14" fill="url(#s2head)"/>
  <!-- Visor -->
  <rect x="70" y="62" width="60" height="28" rx="9" fill="url(#s2visor)"/>
  <!-- Eyes — sharper -->
  <circle cx="87" cy="76" r="8" fill="#a78bfa"/>
  <circle cx="113" cy="76" r="8" fill="#a78bfa"/>
  <circle cx="88" cy="74" r="3.5" fill="white" opacity="0.9"/>
  <circle cx="114" cy="74" r="3.5" fill="white" opacity="0.9"/>
  <!-- Body -->
  <rect x="68" y="114" width="64" height="48" rx="14" fill="url(#s2body)"/>
  <!-- Chest panel -->
  <rect x="80" y="124" width="40" height="24" rx="6" fill="#2e1065" opacity="0.5"/>
  <circle cx="92" cy="136" r="4" fill="#818cf8"/>
  <circle cx="108" cy="136" r="4" fill="#34d399"/>
  <!-- Arms -->
  <rect x="30" y="120" width="34" height="14" rx="7" fill="url(#s2arm)"/>
  <rect x="136" y="120" width="34" height="14" rx="7" fill="url(#s2arm)"/>
  <ellipse cx="30" cy="113" rx="20" ry="5" fill="#7c3aed" opacity="0.5"/>
  <ellipse cx="170" cy="113" rx="20" ry="5" fill="#7c3aed" opacity="0.5"/>
  <!-- Legs -->
  <rect x="78" y="160" width="16" height="24" rx="7" fill="url(#s2leg)"/>
  <rect x="106" y="160" width="16" height="24" rx="7" fill="url(#s2leg)"/>
  <defs>
    <radialGradient id="s2bg" cx="50%" cy="50%"><stop stop-color="#a78bfa"/><stop offset="1" stop-color="#7c3aed"/></radialGradient>
    <linearGradient id="s2head" x1="62" y1="50" x2="138" y2="112" gradientUnits="userSpaceOnUse"><stop stop-color="#5b21b6"/><stop offset="1" stop-color="#2e1065"/></linearGradient>
    <linearGradient id="s2visor" x1="70" y1="62" x2="130" y2="90" gradientUnits="userSpaceOnUse"><stop stop-color="#7c3aed" stop-opacity="0.9"/><stop offset="1" stop-color="#a78bfa" stop-opacity="0.6"/></linearGradient>
    <linearGradient id="s2body" x1="68" y1="114" x2="132" y2="162" gradientUnits="userSpaceOnUse"><stop stop-color="#4c1d95"/><stop offset="1" stop-color="#3b0764"/></linearGradient>
    <linearGradient id="s2arm" x1="30" y1="120" x2="170" y2="134" gradientUnits="userSpaceOnUse"><stop stop-color="#5b21b6"/><stop offset="1" stop-color="#7c3aed"/></linearGradient>
    <linearGradient id="s2leg" x1="78" y1="160" x2="122" y2="184" gradientUnits="userSpaceOnUse"><stop stop-color="#4c1d95"/><stop offset="1" stop-color="#3b0764"/></linearGradient>
    <linearGradient id="s2wing" x1="10" y1="65" x2="68" y2="115" gradientUnits="userSpaceOnUse"><stop stop-color="#a78bfa" stop-opacity="0.7"/><stop offset="1" stop-color="#7c3aed" stop-opacity="0.1"/></linearGradient>
  </defs>
</svg>
